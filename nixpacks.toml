[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.zip", "php83Extensions.bcmath", "php83Extensions.gd", "php83Extensions.opcache", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.fileinfo"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["php artisan config:clear", "php artisan route:clear", "php artisan view:clear", "mkdir -p storage/framework/{sessions,views,cache/data}", "mkdir -p storage/logs", "mkdir -p bootstrap/cache"]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php artisan db:seed-admin && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
